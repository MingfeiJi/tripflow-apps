<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>星际穿越 - Space Dodge</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a1a;
    overflow: hidden;
    font-family: 'Noto Sans SC', sans-serif;
    height: 100vh;
    width: 100vw;
    display: flex;
    justify-content: center;
    align-items: center;
    touch-action: none;
    user-select: none;
  }

  canvas {
    display: block;
    border-radius: 4px;
  }

  #ui-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
    pointer-events: none;
  }

  #start-screen, #gameover-screen {
    text-align: center;
    pointer-events: auto;
    animation: fadeIn 0.6s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { text-shadow: 0 0 20px rgba(0, 200, 255, 0.5); }
    50% { text-shadow: 0 0 40px rgba(0, 200, 255, 0.9), 0 0 80px rgba(0, 100, 255, 0.4); }
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .game-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(36px, 8vw, 64px);
    font-weight: 900;
    color: #00d4ff;
    text-shadow: 0 0 30px rgba(0, 200, 255, 0.6), 0 0 60px rgba(0, 100, 255, 0.3);
    letter-spacing: 4px;
    margin-bottom: 8px;
    animation: pulse 3s ease-in-out infinite;
  }

  .game-subtitle {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(12px, 3vw, 18px);
    color: rgba(0, 212, 255, 0.5);
    letter-spacing: 8px;
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .start-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(14px, 3vw, 18px);
    font-weight: 700;
    color: #0a0a1a;
    background: linear-gradient(135deg, #00d4ff, #0088ff);
    border: none;
    padding: 16px 48px;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: all 0.3s ease;
    box-shadow: 0 0 30px rgba(0, 200, 255, 0.3), inset 0 1px 0 rgba(255,255,255,0.2);
    animation: float 2.5s ease-in-out infinite;
  }

  .start-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 50px rgba(0, 200, 255, 0.5), inset 0 1px 0 rgba(255,255,255,0.3);
  }

  .start-btn:active {
    transform: scale(0.98);
  }

  .hint {
    font-size: clamp(11px, 2.5vw, 14px);
    color: rgba(255, 255, 255, 0.3);
    margin-top: 24px;
    letter-spacing: 1px;
  }

  .score-final {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(48px, 10vw, 80px);
    font-weight: 900;
    background: linear-gradient(135deg, #ff6b6b, #ffa94d, #ffd43b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 16px 0;
  }

  .score-label {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(12px, 2.5vw, 16px);
    color: rgba(255, 255, 255, 0.4);
    letter-spacing: 6px;
    text-transform: uppercase;
  }

  .best-score {
    font-size: clamp(13px, 2.5vw, 15px);
    color: rgba(0, 212, 255, 0.6);
    margin-bottom: 32px;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui-overlay">
  <div id="start-screen">
    <div class="game-title">星际穿越</div>
    <div class="game-subtitle">Space Dodge</div>
    <button class="start-btn" id="startBtn">开始游戏</button>
    <div class="hint">← → 方向键 / 触屏滑动控制飞船</div>
  </div>

  <div id="gameover-screen" class="hidden">
    <div class="score-label">得分</div>
    <div class="score-final" id="finalScore">0</div>
    <div class="best-score" id="bestScore">最高纪录: 0</div>
    <button class="start-btn" id="retryBtn">再来一局</button>
    <div class="hint">每次都会更快哦 💫</div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- Responsive canvas ---
function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// --- Game State ---
let gameState = 'menu'; // menu, playing, gameover
let score = 0;
let bestScore = 0;
let ship, obstacles, particles, stars, powerups;
let speed, spawnTimer, difficultyTimer;
let animFrame;

// --- Colors ---
const COLORS = {
  ship: '#00d4ff',
  shipGlow: 'rgba(0, 212, 255, 0.3)',
  obstacle: ['#ff6b6b', '#ffa94d', '#ff8787', '#e64980', '#f06595'],
  particle: ['#00d4ff', '#4dabf7', '#74c0fc', '#a5d8ff'],
  star: 'rgba(255, 255, 255, ',
  powerup: '#ffd43b',
  shield: '#51cf66',
};

// --- Stars Background ---
function createStars() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 2 + 0.5,
      speed: Math.random() * 2 + 0.5,
      opacity: Math.random() * 0.6 + 0.2,
    });
  }
}

function updateStars() {
  stars.forEach(s => {
    s.y += s.speed * (gameState === 'playing' ? 1 + score / 500 : 0.5);
    if (s.y > canvas.height) {
      s.y = -2;
      s.x = Math.random() * canvas.width;
    }
  });
}

function drawStars() {
  stars.forEach(s => {
    ctx.fillStyle = COLORS.star + s.opacity + ')';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
    ctx.fill();
  });
}

// --- Ship ---
function createShip() {
  ship = {
    x: canvas.width / 2,
    y: canvas.height - 120,
    width: 36,
    height: 44,
    targetX: canvas.width / 2,
    speed: 0,
    tilt: 0,
    shield: false,
    shieldTimer: 0,
    trail: [],
  };
}

function drawShip() {
  const { x, y, width, height, tilt, shield } = ship;

  // Trail
  ship.trail.push({ x, y: y + height / 2, opacity: 1 });
  if (ship.trail.length > 12) ship.trail.shift();
  ship.trail.forEach((t, i) => {
    t.opacity -= 0.08;
    const alpha = Math.max(0, t.opacity);
    ctx.fillStyle = `rgba(0, 150, 255, ${alpha * 0.3})`;
    ctx.beginPath();
    ctx.arc(t.x, t.y + (ship.trail.length - i) * 3, 4 - i * 0.3, 0, Math.PI * 2);
    ctx.fill();
  });

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(tilt * 0.15);

  // Engine glow
  const glowGrad = ctx.createRadialGradient(0, height / 2 + 8, 2, 0, height / 2 + 8, 24);
  glowGrad.addColorStop(0, 'rgba(0, 180, 255, 0.8)');
  glowGrad.addColorStop(0.5, 'rgba(0, 100, 255, 0.3)');
  glowGrad.addColorStop(1, 'rgba(0, 50, 255, 0)');
  ctx.fillStyle = glowGrad;
  ctx.beginPath();
  ctx.arc(0, height / 2 + 8, 24 + Math.sin(Date.now() / 80) * 4, 0, Math.PI * 2);
  ctx.fill();

  // Ship body
  ctx.fillStyle = COLORS.ship;
  ctx.shadowColor = COLORS.ship;
  ctx.shadowBlur = 20;
  ctx.beginPath();
  ctx.moveTo(0, -height / 2);
  ctx.lineTo(-width / 2, height / 2);
  ctx.lineTo(-width / 4, height / 3);
  ctx.lineTo(0, height / 2.5 + 4);
  ctx.lineTo(width / 4, height / 3);
  ctx.lineTo(width / 2, height / 2);
  ctx.closePath();
  ctx.fill();

  // Cockpit
  ctx.fillStyle = '#0a1628';
  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.ellipse(0, -4, 6, 10, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(0, 212, 255, 0.4)';
  ctx.beginPath();
  ctx.ellipse(0, -6, 3, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Shield
  if (shield) {
    ctx.strokeStyle = COLORS.shield;
    ctx.shadowColor = COLORS.shield;
    ctx.shadowBlur = 15;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, 32, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  ctx.restore();
}

// --- Obstacles ---
function createObstacle() {
  const size = Math.random() * 28 + 16;
  const x = Math.random() * (canvas.width - size * 2) + size;
  obstacles.push({
    x,
    y: -size * 2,
    size,
    speed: speed * (Math.random() * 0.5 + 0.8),
    rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.06,
    color: COLORS.obstacle[Math.floor(Math.random() * COLORS.obstacle.length)],
    vertices: generateAsteroidVertices(size),
  });
}

function generateAsteroidVertices(size) {
  const verts = [];
  const count = Math.floor(Math.random() * 4) + 6;
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2;
    const r = size * (0.7 + Math.random() * 0.5);
    verts.push({ angle, r });
  }
  return verts;
}

function drawObstacle(ob) {
  ctx.save();
  ctx.translate(ob.x, ob.y);
  ctx.rotate(ob.rotation);

  ctx.fillStyle = ob.color;
  ctx.shadowColor = ob.color;
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ob.vertices.forEach((v, i) => {
    const px = Math.cos(v.angle) * v.r;
    const py = Math.sin(v.angle) * v.r;
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  });
  ctx.closePath();
  ctx.fill();

  // inner highlight
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.beginPath();
  ob.vertices.forEach((v, i) => {
    const px = Math.cos(v.angle) * v.r * 0.6;
    const py = Math.sin(v.angle) * v.r * 0.6;
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  });
  ctx.closePath();
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.restore();
}

// --- Particles ---
function spawnParticles(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * 5 + 2;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      size: Math.random() * 4 + 1,
      life: 1,
      decay: Math.random() * 0.03 + 0.02,
      color: color || COLORS.particle[Math.floor(Math.random() * COLORS.particle.length)],
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    p.vx *= 0.98;
    p.vy *= 0.98;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

// --- Power-ups ---
function createPowerup() {
  powerups.push({
    x: Math.random() * (canvas.width - 40) + 20,
    y: -20,
    size: 12,
    speed: speed * 0.6,
    glow: 0,
  });
}

function drawPowerup(p) {
  p.glow = (Math.sin(Date.now() / 200) + 1) / 2;
  ctx.save();
  ctx.translate(p.x, p.y);

  ctx.fillStyle = COLORS.shield;
  ctx.shadowColor = COLORS.shield;
  ctx.shadowBlur = 20 + p.glow * 15;
  ctx.beginPath();
  ctx.arc(0, 0, p.size, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = 'bold 14px Orbitron';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('S', 0, 1);

  ctx.shadowBlur = 0;
  ctx.restore();
}

// --- HUD ---
function drawHUD() {
  // Score
  ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
  ctx.font = "700 clamp(20px, 4vw, 28px) 'Orbitron', monospace";
  ctx.textAlign = 'center';
  ctx.fillText(Math.floor(score), canvas.width / 2, 50);

  // Score label
  ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
  ctx.font = "500 11px 'Orbitron', monospace";
  ctx.fillText('SCORE', canvas.width / 2, 70);
}

// --- Input ---
let keys = {};
let touchStartX = null;

document.addEventListener('keydown', e => { keys[e.key] = true; });
document.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchStartX = e.touches[0].clientX;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (touchStartX !== null && gameState === 'playing') {
    ship.targetX = e.touches[0].clientX;
  }
}, { passive: false });

canvas.addEventListener('touchend', () => { touchStartX = null; });

canvas.addEventListener('mousemove', e => {
  if (gameState === 'playing') {
    ship.targetX = e.clientX;
  }
});

// --- Collision ---
function checkCollision(ob) {
  const dx = ship.x - ob.x;
  const dy = ship.y - ob.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  return dist < ob.size + 14;
}

function checkPowerupCollision(p) {
  const dx = ship.x - p.x;
  const dy = ship.y - p.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  return dist < p.size + 18;
}

// --- Game Logic ---
function initGame() {
  createShip();
  obstacles = [];
  particles = [];
  powerups = [];
  score = 0;
  speed = 3;
  spawnTimer = 0;
  difficultyTimer = 0;
  if (!stars || stars.length === 0) createStars();
}

function update(dt) {
  if (gameState !== 'playing') return;

  // Ship movement
  if (keys['ArrowLeft'] || keys['a']) ship.targetX = ship.x - 12;
  if (keys['ArrowRight'] || keys['d']) ship.targetX = ship.x + 12;

  const dx = ship.targetX - ship.x;
  ship.x += dx * 0.12;
  ship.tilt = dx * 0.008;
  ship.x = Math.max(24, Math.min(canvas.width - 24, ship.x));
  ship.y = canvas.height - 120;

  // Shield timer
  if (ship.shield) {
    ship.shieldTimer -= dt;
    if (ship.shieldTimer <= 0) ship.shield = false;
  }

  // Score
  score += dt * 0.06 * (1 + speed / 5);

  // Difficulty
  difficultyTimer += dt;
  if (difficultyTimer > 500) {
    speed += 0.15;
    difficultyTimer = 0;
  }

  // Spawn obstacles
  spawnTimer += dt;
  const spawnRate = Math.max(200, 700 - score * 0.8);
  if (spawnTimer > spawnRate) {
    createObstacle();
    spawnTimer = 0;
  }

  // Spawn powerups
  if (Math.random() < 0.001 + score * 0.000005) {
    createPowerup();
  }

  // Update obstacles
  for (let i = obstacles.length - 1; i >= 0; i--) {
    const ob = obstacles[i];
    ob.y += ob.speed;
    ob.rotation += ob.rotSpeed;

    if (ob.y > canvas.height + ob.size * 2) {
      obstacles.splice(i, 1);
      continue;
    }

    if (checkCollision(ob)) {
      if (ship.shield) {
        spawnParticles(ob.x, ob.y, COLORS.shield, 15);
        obstacles.splice(i, 1);
        score += 10;
      } else {
        // Game Over
        spawnParticles(ship.x, ship.y, '#ff6b6b', 30);
        spawnParticles(ship.x, ship.y, '#ffa94d', 20);
        gameOver();
        return;
      }
    }
  }

  // Update powerups
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.y += p.speed;

    if (p.y > canvas.height + 20) {
      powerups.splice(i, 1);
      continue;
    }

    if (checkPowerupCollision(p)) {
      ship.shield = true;
      ship.shieldTimer = 5000;
      spawnParticles(p.x, p.y, COLORS.shield, 10);
      powerups.splice(i, 1);
    }
  }

  updateParticles();
  updateStars();
}

function draw() {
  // Background
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Subtle nebula
  const nebGrad = ctx.createRadialGradient(
    canvas.width * 0.3, canvas.height * 0.4, 0,
    canvas.width * 0.3, canvas.height * 0.4, canvas.width * 0.6
  );
  nebGrad.addColorStop(0, 'rgba(20, 0, 60, 0.3)');
  nebGrad.addColorStop(0.5, 'rgba(0, 10, 40, 0.15)');
  nebGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = nebGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawStars();

  if (gameState === 'playing' || gameState === 'gameover') {
    obstacles.forEach(drawObstacle);
    powerups.forEach(drawPowerup);
    drawParticles();
    if (gameState === 'playing') {
      drawShip();
      drawHUD();
    }
  }
}

function gameOver() {
  gameState = 'gameover';
  const finalScore = Math.floor(score);
  if (finalScore > bestScore) bestScore = finalScore;
  document.getElementById('finalScore').textContent = finalScore;
  document.getElementById('bestScore').textContent = `最高纪录: ${bestScore}`;
  document.getElementById('gameover-screen').classList.remove('hidden');
}

function startGame() {
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('gameover-screen').classList.add('hidden');
  initGame();
  gameState = 'playing';
}

// --- Main Loop ---
let lastTime = 0;
function gameLoop(timestamp) {
  const dt = Math.min(timestamp - lastTime, 50);
  lastTime = timestamp;

  update(dt);
  draw();

  // Menu stars
  if (gameState === 'menu') updateStars();

  animFrame = requestAnimationFrame(gameLoop);
}

// --- Events ---
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('retryBtn').addEventListener('click', startGame);

// Init
createStars();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
